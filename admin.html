<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agora — Super Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --teal:    #2C5F6E;
    --teal2:   #1a3d47;
    --gold:    #E2C97E;
    --gold2:   #c9a94e;
    --bg:      #0d1b1e;
    --bg2:     #122229;
    --bg3:     #1a3040;
    --text:    #e8f0f2;
    --muted:   #7a9aa5;
    --border:  #1e3a45;
    --green:   #4caf7d;
    --red:     #e05c5c;
    --orange:  #e09a3a;
    --radius:  10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 40%, #1a3d4788 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, #0d252a88 0%, transparent 60%),
                var(--bg);
  }

  .auth-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 380px;
    text-align: center;
  }

  .auth-logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .auth-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
  }

  .auth-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
    font-family: 'DM Mono', monospace;
  }

  .auth-box input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    transition: border-color .2s;
  }

  .auth-box input:focus { border-color: var(--teal); }

  .btn-auth {
    width: 100%;
    background: var(--teal);
    color: var(--gold);
    border: none;
    border-radius: var(--radius);
    padding: 13px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background .2s, transform .1s;
  }

  .btn-auth:hover { background: var(--teal2); transform: translateY(-1px); }

  #auth-error {
    color: var(--red);
    font-size: 13px;
    margin-top: 12px;
    font-family: 'DM Mono', monospace;
    display: none;
  }

  /* ── LAYOUT ── */
  #app { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 60px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-logo {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .topbar-sep { color: var(--border); font-size: 20px; }

  .topbar-title {
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .user-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: all .2s;
  }

  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ── MAIN ── */
  .main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  /* ── KPI ROW ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .kpi {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    opacity: .4;
  }

  .kpi-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .kpi-value {
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .kpi-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 6px;
  }

  /* ── GRID ── */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .panel-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .panel-count {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    background: var(--bg3);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ── COMMUNES TABLE ── */
  .commune-row {
    display: grid;
    grid-template-columns: 1fr 60px 80px 100px 80px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    gap: 12px;
  }

  .commune-row:last-child { border-bottom: none; }
  .commune-row:hover { background: #ffffff05; }

  .commune-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .commune-slug {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-top: 2px;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    text-align: center;
  }

  .badge-on  { background: #4caf7d22; color: var(--green); border: 1px solid #4caf7d44; }
  .badge-off { background: #e05c5c22; color: var(--red);   border: 1px solid #e05c5c44; }

  .stat-num {
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    color: var(--text);
  }

  .stat-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-align: center;
  }

  .btn-toggle {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all .2s;
    color: var(--muted);
  }

  .btn-toggle.on:hover  { border-color: var(--red);   color: var(--red); }
  .btn-toggle.off:hover { border-color: var(--green); color: var(--green); }

  /* ── ADMINS ── */
  .admin-row {
    display: grid;
    grid-template-columns: 1fr 120px 80px;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background .15s;
  }

  .admin-row:last-child { border-bottom: none; }
  .admin-row:hover { background: #ffffff05; }

  .admin-name { font-size: 14px; font-weight: 600; }
  .admin-commune {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-top: 2px;
  }

  .role-badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 3px 8px;
    border-radius: 4px;
    text-align: center;
  }

  .role-super { background: #E2C97E22; color: var(--gold); border: 1px solid #E2C97E44; }
  .role-admin { background: #2C5F6E33; color: #7ec8d8;     border: 1px solid #2C5F6E66; }

  .btn-promote {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    color: var(--muted);
    transition: all .2s;
    white-space: nowrap;
  }

  .btn-promote:hover { border-color: var(--gold); color: var(--gold); }

  /* ── ACTIVITÉ ── */
  .activity-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }

  .activity-row:last-child { border-bottom: none; }
  .activity-row:hover { background: #ffffff05; }

  .activity-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }

  .dot-signal { background: var(--orange); }
  .dot-mur    { background: var(--teal); }
  .dot-actu   { background: var(--gold); }
  .dot-user   { background: var(--green); }

  .activity-content { flex: 1; }
  .activity-title { font-size: 13px; color: var(--text); line-height: 1.4; }
  .activity-meta {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-top: 3px;
    display: flex;
    gap: 10px;
  }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 20px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    opacity: 0;
    transform: translateY(10px);
    transition: all .3s;
    z-index: 999;
    pointer-events: none;
  }

  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .grid-2  { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Agora</div>
    <div class="auth-title">Super Admin</div>
    <div class="auth-sub">plateforme-agora.fr</div>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="btn-auth" onclick="login()">Connexion</button>
    <div id="auth-error">Email ou mot de passe incorrect</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <span class="topbar-logo">Agora</span>
      <span class="topbar-sep">·</span>
      <span class="topbar-title">super_admin</span>
    </div>
    <div class="topbar-right">
      <span class="user-chip" id="user-email">—</span>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="main">

    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Communes</div>
        <div class="kpi-value" id="kpi-communes">—</div>
        <div class="kpi-sub" id="kpi-communes-sub">dont — actives</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Utilisateurs</div>
        <div class="kpi-value" id="kpi-users">—</div>
        <div class="kpi-sub">tous rôles confondus</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Signalements</div>
        <div class="kpi-value" id="kpi-signals">—</div>
        <div class="kpi-sub">total plateforme</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Posts mur</div>
        <div class="kpi-value" id="kpi-posts">—</div>
        <div class="kpi-sub">total plateforme</div>
      </div>
    </div>

    <!-- Communes + Admins -->
    <div class="grid-2">

      <!-- COMMUNES -->
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Communes</span>
          <span class="panel-count" id="communes-count">…</span>
        </div>
        <div id="communes-list"><div class="loading">Chargement…</div></div>
      </div>

      <!-- ADMINS -->
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Admins communaux</span>
          <span class="panel-count" id="admins-count">…</span>
        </div>
        <div id="admins-list"><div class="loading">Chargement…</div></div>
      </div>

    </div>

    <!-- ACTIVITÉ -->
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Activité récente</span>
        <span class="panel-count" id="activity-count">…</span>
      </div>
      <div id="activity-list"><div class="loading">Chargement…</div></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://jofeldziwqdswfhqqrcv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvZmVsZHppd3Fkc3dmaHFxcmN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTQ0NzMsImV4cCI6MjA4OTMzMDQ3M30.PqkaS0TdQ_4wiZSX2lJuaPHr1zFyd9jovt9Ucd8IhQc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

// ── AUTH ──
async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.style.display = 'block'; return; }

  // Vérifier que c'est bien un super_admin
  const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
  if (!profile || profile.role !== 'super_admin') {
    await sb.auth.signOut();
    errEl.textContent = 'Accès réservé aux super admins';
    errEl.style.display = 'block';
    return;
  }

  currentUser = data.user;
  document.getElementById('user-email').textContent = email;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadAll();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// ── LOAD ALL ──
async function loadAll() {
  await Promise.all([loadCommunes(), loadAdmins(), loadActivity(), loadKpis()]);
}

// ── KPIs ──
async function loadKpis() {
  const [
    { data: communes },
    { count: users },
    { count: signals },
    { count: posts }
  ] = await Promise.all([
    sb.from('communes').select('actif'),
    sb.from('profiles').select('*', { count: 'exact', head: true }),
    sb.from('signalements').select('*', { count: 'exact', head: true }),
    sb.from('mur_voisins').select('*', { count: 'exact', head: true })
  ]);

  const total  = communes?.length || 0;
  const active = communes?.filter(c => c.actif).length || 0;

  document.getElementById('kpi-communes').textContent     = total;
  document.getElementById('kpi-communes-sub').textContent = `dont ${active} active${active > 1 ? 's' : ''}`;
  document.getElementById('kpi-users').textContent        = users || 0;
  document.getElementById('kpi-signals').textContent      = signals || 0;
  document.getElementById('kpi-posts').textContent        = posts || 0;
}

// ── COMMUNES ──
async function loadCommunes() {
  const { data: communes } = await sb.from('communes').select('*').order('nom');
  const { data: userCounts } = await sb.from('profiles').select('commune_id');

  const countByCommune = {};
  userCounts?.forEach(p => {
    countByCommune[p.commune_id] = (countByCommune[p.commune_id] || 0) + 1;
  });

  const el = document.getElementById('communes-list');
  document.getElementById('communes-count').textContent = `${communes?.length || 0} communes`;

  if (!communes?.length) { el.innerHTML = '<div class="loading">Aucune commune</div>'; return; }

  el.innerHTML = communes.map(c => `
    <div class="commune-row" id="crow-${c.id}">
      <div>
        <div class="commune-name">${c.nom}</div>
        <div class="commune-slug">${c.slug}.plateforme-agora.fr</div>
      </div>
      <div>
        <div class="stat-num">${countByCommune[c.id] || 0}</div>
        <div class="stat-label">users</div>
      </div>
      <span class="badge ${c.actif ? 'badge-on' : 'badge-off'}" id="badge-${c.id}">
        ${c.actif ? 'ACTIVE' : 'OFF'}
      </span>
      <div style="text-align:center">
        <div class="stat-num" style="font-size:14px;color:var(--gold)">id ${c.id}</div>
        <div class="stat-label">commune_id</div>
      </div>
      <button class="btn-toggle ${c.actif ? 'on' : 'off'}" id="tbtn-${c.id}"
        onclick="toggleCommune(${c.id}, ${c.actif})">
        ${c.actif ? '⏸ Pause' : '▶ Activer'}
      </button>
    </div>
  `).join('');
}

async function toggleCommune(id, actif) {
  const newVal = !actif;
  const { error } = await sb.from('communes').update({ actif: newVal }).eq('id', id);
  if (error) { toast('❌ Erreur lors de la mise à jour'); return; }

  document.getElementById(`badge-${id}`).className = `badge ${newVal ? 'badge-on' : 'badge-off'}`;
  document.getElementById(`badge-${id}`).textContent = newVal ? 'ACTIVE' : 'OFF';
  const btn = document.getElementById(`tbtn-${id}`);
  btn.className = `btn-toggle ${newVal ? 'on' : 'off'}`;
  btn.textContent = newVal ? '⏸ Pause' : '▶ Activer';
  btn.onclick = () => toggleCommune(id, newVal);

  toast(newVal ? '✅ Commune activée' : '⏸ Commune suspendue');
  loadKpis();
}

// ── ADMINS ──
async function loadAdmins() {
  const { data: admins } = await sb
    .from('profiles')
    .select('id, nom, pseudo, role, commune_id')
    .in('role', ['admin', 'super_admin'])
    .order('role');

  const { data: communes } = await sb.from('communes').select('id, slug, nom');
  const communeMap = {};
  communes?.forEach(c => { communeMap[c.id] = c; });

  const el = document.getElementById('admins-list');
  document.getElementById('admins-count').textContent = `${admins?.length || 0} admins`;

  if (!admins?.length) { el.innerHTML = '<div class="loading">Aucun admin</div>'; return; }

  el.innerHTML = admins.map(a => {
    const commune = communeMap[a.commune_id];
    const isSuperAdmin = a.role === 'super_admin';
    return `
      <div class="admin-row">
        <div>
          <div class="admin-name">${a.nom || a.pseudo}</div>
          <div class="admin-commune">
            ${commune ? `${commune.nom} · @${a.pseudo}` : `@${a.pseudo}`}
          </div>
        </div>
        <span class="role-badge ${isSuperAdmin ? 'role-super' : 'role-admin'}">
          ${a.role}
        </span>
        ${!isSuperAdmin ? `
          <button class="btn-promote" onclick="promoteAdmin('${a.id}', '${a.pseudo}')">
            → super_admin
          </button>
        ` : '<div></div>'}
      </div>
    `;
  }).join('');
}

async function promoteAdmin(id, pseudo) {
  if (!confirm(`Promouvoir @${pseudo} en super_admin ?`)) return;
  const { error } = await sb.from('profiles').update({ role: 'super_admin' }).eq('id', id);
  if (error) { toast('❌ Erreur'); return; }
  toast(`⭐ @${pseudo} promu super_admin`);
  loadAdmins();
}

// ── ACTIVITÉ RÉCENTE ──
async function loadActivity() {
  const { data: communes } = await sb.from('communes').select('id, nom');
  const communeMap = {};
  communes?.forEach(c => { communeMap[c.id] = c.nom; });

  const [
    { data: signals },
    { data: posts },
    { data: users }
  ] = await Promise.all([
    sb.from('signalements').select('titre,auteur_nom,commune_id,created_at').order('created_at', { ascending: false }).limit(5),
    sb.from('mur_voisins').select('contenu,auteur_nom,commune_id,created_at').order('created_at', { ascending: false }).limit(5),
    sb.from('profiles').select('nom,pseudo,commune_id,created_at').order('created_at', { ascending: false }).limit(5)
  ]);

  // Fusionner et trier
  const events = [
    ...(signals || []).map(s => ({ type: 'signal', label: s.titre, author: s.auteur_nom, commune: communeMap[s.commune_id] || '—', date: s.created_at })),
    ...(posts   || []).map(p => ({ type: 'mur',    label: p.contenu?.substring(0, 60) + '…', author: p.auteur_nom, commune: communeMap[p.commune_id] || '—', date: p.created_at })),
    ...(users   || []).map(u => ({ type: 'user',   label: `Nouveau compte — @${u.pseudo}`, author: u.nom, commune: communeMap[u.commune_id] || '—', date: u.created_at }))
  ].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 15);

  const el = document.getElementById('activity-list');
  document.getElementById('activity-count').textContent = `${events.length} derniers événements`;

  if (!events.length) { el.innerHTML = '<div class="loading">Aucune activité</div>'; return; }

  const typeConfig = {
    signal: { dot: 'dot-signal', icon: '📍' },
    mur:    { dot: 'dot-mur',    icon: '💬' },
    user:   { dot: 'dot-user',   icon: '👤' }
  };

  el.innerHTML = events.map(e => {
    const cfg  = typeConfig[e.type] || { dot: 'dot-mur', icon: '•' };
    const time = new Date(e.date).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    return `
      <div class="activity-row">
        <div class="activity-dot ${cfg.dot}"></div>
        <div class="activity-content">
          <div class="activity-title">${cfg.icon} ${e.label}</div>
          <div class="activity-meta">
            <span>${e.author || '—'}</span>
            <span>·</span>
            <span style="color:var(--gold)">${e.commune}</span>
            <span>·</span>
            <span>${time}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
